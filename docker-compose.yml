services:
  database:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: event_management
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - ./database/migrations:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: database
      MYSQL_ROOT_PASSWORD: rootpassword
    depends_on:
      - database

  server:
    build:
      context: ./server
    ports:
      - "8000:8000"
    depends_on:
      - database
    volumes:
      - ./server:/app
      - ./database:/app/database
      - server_vendor:/app/vendor
    environment:
      DB_CONNECTION: mysql
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: event_management
      DB_USERNAME: user
      DB_PASSWORD: password
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000

  client:
    build:
      context: ./client
    ports:
      - "3000:5173"
    stdin_open: true
    tty: true
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true

volumes:
  mysql_data:
  server_vendor: